name: Build Android AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore $GITHUB_WORKSPACE/instacord.keystore \
            -alias instacord \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass InstaCord2024! \
            -keypass InstaCord2024! \
            -dname "CN=INSTA-CORD, OU=App, O=INSTA-CORD, L=US, ST=US, C=US"

      - name: Build Signed Release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/instacord.keystore
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: INSTA-CORD-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
